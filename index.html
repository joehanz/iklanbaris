<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iklan Baris Online</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#0f172a;
color:#fff;
}

header{
padding:20px;
text-align:center;
background:#111827;
position:sticky;
top:0;
}

header h1{
margin:0;
font-size:20px;
}

.search{
margin-top:10px;
}

.search input{
width:90%;
max-width:500px;
padding:10px;
border-radius:8px;
border:none;
outline:none;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
padding:20px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.card h3{
margin:0 0 10px;
font-size:16px;
}

.card p{
font-size:14px;
opacity:0.9;
}

.price{
color:#22c55e;
font-weight:bold;
margin:10px 0;
}

.btn{
display:inline-block;
padding:8px 12px;
background:#22c55e;
color:#000;
border-radius:8px;
text-decoration:none;
font-size:13px;
font-weight:bold;
}

.fab{
position:fixed;
right:20px;
bottom:20px;
background:#3b82f6;
color:#fff;
padding:15px;
border-radius:50px;
text-decoration:none;
font-size:14px;
box-shadow:0 5px 15px rgba(0,0,0,0.4);
}

footer{
text-align:center;
padding:20px;
font-size:12px;
opacity:0.7;
}
</style>
</head>

<body>

<header>
<h1>📢 Iklan Baris Online</h1>
<div class="search">
<input type="text" placeholder="Cari iklan...">
</div>
</header>

<div class="container" id="listIklan">

<!-- CONTOH IKLAN (STATIC DULU) -->
<div class="card">
<h3>Telur Ayam Kampung Segar</h3>
<p>Telur langsung dari peternakan, fresh setiap hari.</p>
<div class="price">Rp 4.500 / butir</div>
<a class="btn" href="https://wa.me/6281234567890" target="_blank">Chat WhatsApp</a>
</div>

<div class="card">
<h3>Jasa Cuci Motor</h3>
<p>Cuci motor cepat dan bersih area Surabaya.</p>
<div class="price">Rp 15.000</div>
<a class="btn" href="https://wa.me/6281234567890" target="_blank">Chat WhatsApp</a>
</div>

</div>

<a class="fab" href="pasang.html">+ Pasang Iklan</a>

<footer>
© 2026 Iklan Baris Online - GitHub Pages
</footer>

</body>
</html>
