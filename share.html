<!doctype html>
<html>
<head>
<meta charset="utf-8">

<meta id="og-title" property="og:title" content="Loading...">
<meta id="og-desc" property="og:description" content="Loading...">
<meta id="og-image" property="og:image" content="">
<meta id="og-url" property="og:url" content="">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Share Iklan</title>

<script>
const id = new URLSearchParams(location.search).get("id");

const api = "https://script.google.com/macros/s/AKfycbXXXX/exec?action=detail&id=" + id;

fetch(api)
  .then(r => r.json())
  .then(res => {

    if(!res.success){
      document.body.innerHTML = "Iklan tidak ditemukan";
      return;
    }

    const ad = res.ad;

    document.getElementById("title").innerText = ad.title;
    document.getElementById("desc").innerText = ad.description;
    document.getElementById("img").src = ad.image;

  })
  .catch(() => {
    document.body.innerHTML = "Gagal memuat data";
  });
</script>

</head>

<body>
Loading...
</body>
</html>
