<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Iklan Saya</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="form-page">

<div class="form-card">

<h2>

IKLAN SAYA

</h2>

<div style="padding:25px;">

<div class="form-group">

<label>

ID Iklan

</label>

<input
type="text"
id="adId"
placeholder="Contoh: IKL000123"
>

</div>

<div class="form-group">

<label>

Kode Kelola

</label>

<input
type="text"
id="secretCode"
placeholder="Contoh: Q8M7X2KP"
>

</div>

<button
id="checkBtn"
class="submit-btn"
>

TAMPILKAN IKLAN

</button>

<div
id="resultBox"
class="status-box"
style="margin-top:20px;"
>

</div>

</div>

</div>

</div>

<script src="iklan-saya.js"></script>

</body>
</html>
